name: Publish containers

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: true
        type: string
      version:
        description: Image tag to publish
        required: true
        type: string
      tag_latest:
        description: Whether to also push the latest tag
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to publish (for example 0.4.0)
        required: true

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: stac
            context: .
            dockerfile: dockerfiles/Dockerfile.stac
            platforms: linux/amd64,linux/arm64
          - name: raster
            context: .
            dockerfile: dockerfiles/Dockerfile.raster
            platforms: linux/amd64
          - name: vector
            context: .
            dockerfile: dockerfiles/Dockerfile.vector
            platforms: linux/amd64,linux/arm64
          - name: stac-browser
            context: dockerfiles
            dockerfile: dockerfiles/Dockerfile.browser
            platforms: linux/amd64,linux/arm64
          - name: stac-map
            context: dockerfiles
            dockerfile: dockerfiles/Dockerfile.stac-map
            platforms: linux/amd64,linux/arm64

    steps:
      - name: Resolve inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            REF="${{ inputs.ref }}"
            VERSION="${{ inputs.version }}"
            TAG_LATEST="${{ inputs.tag_latest }}"
          else
            REF="${{ inputs.version }}"
            VERSION="${{ inputs.version }}"
            TAG_LATEST="false"
          fi

          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_latest=$TAG_LATEST" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ steps.inputs.outputs.ref }}

      - name: Validate release tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags --force
          git rev-parse "refs/tags/${{ steps.inputs.outputs.version }}" >/dev/null

      - name: Set image name
        run: echo "IMAGE_NAME=${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.name }}" >> "$GITHUB_ENV"

      - name: Log in to the GitHub container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image exists
        id: check
        run: |
          if docker manifest inspect "${IMAGE_NAME}:${{ steps.inputs.outputs.version }}" > /dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Image ${IMAGE_NAME}:${{ steps.inputs.outputs.version }} already exists, skipping build"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read stac-browser build args
        if: steps.check.outputs.skip == 'false' && matrix.name == 'stac-browser'
        id: browser
        run: |
          CONFIG=$(docker compose config --format json)
          echo "repo=$(echo "$CONFIG" | jq -r '.services["stac-browser"].build.args.STAC_BROWSER_REPO')" >> "$GITHUB_OUTPUT"
          echo "ref=$(echo "$CONFIG" | jq -r '.services["stac-browser"].build.args.STAC_BROWSER_REF')" >> "$GITHUB_OUTPUT"

      - name: Read stac-map build args
        if: steps.check.outputs.skip == 'false' && matrix.name == 'stac-map'
        id: stac-map
        run: |
          CONFIG=$(docker compose config --format json)
          echo "repo=$(echo "$CONFIG" | jq -r '.services["stac-map"].build.args.STAC_MAP_REPO')" >> "$GITHUB_OUTPUT"
          echo "ref=$(echo "$CONFIG" | jq -r '.services["stac-map"].build.args.STAC_MAP_REF')" >> "$GITHUB_OUTPUT"
          echo "base_path=$(echo "$CONFIG" | jq -r '.services["stac-map"].build.args.VITE_BASE_PATH')" >> "$GITHUB_OUTPUT"
          echo "default_href=$(echo "$CONFIG" | jq -r '.services["stac-map"].build.args.VITE_DEFAULT_HREF')" >> "$GITHUB_OUTPUT"
          echo "browser_url=$(echo "$CONFIG" | jq -r '.services["stac-map"].build.args.VITE_STAC_BROWSER_URL')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.skip == 'false'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Extract Docker metadata
        if: steps.check.outputs.skip == 'false'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.inputs.outputs.version }}
            type=raw,value=latest,enable=${{ steps.inputs.outputs.tag_latest == 'true' }}

      - name: Build and push Docker image
        if: steps.check.outputs.skip == 'false' && matrix.name != 'stac-browser' && matrix.name != 'stac-map'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha,scope=${{ matrix.name }}
            type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Build and push stac-browser image
        if: steps.check.outputs.skip == 'false' && matrix.name == 'stac-browser'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            STAC_BROWSER_REPO=${{ steps.browser.outputs.repo }}
            STAC_BROWSER_REF=${{ steps.browser.outputs.ref }}
          cache-from: |
            type=gha,scope=${{ matrix.name }}
            type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Build and push stac-map image
        if: steps.check.outputs.skip == 'false' && matrix.name == 'stac-map'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            STAC_MAP_REPO=${{ steps.stac-map.outputs.repo }}
            STAC_MAP_REF=${{ steps.stac-map.outputs.ref }}
            VITE_BASE_PATH=${{ steps.stac-map.outputs.base_path }}
            VITE_DEFAULT_HREF=${{ steps.stac-map.outputs.default_href }}
            VITE_STAC_BROWSER_URL=${{ steps.stac-map.outputs.browser_url }}
          cache-from: |
            type=gha,scope=${{ matrix.name }}
            type=registry,ref=${{ env.IMAGE_NAME }}:latest
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
