version: 2

updates:
  # Root project: uv-managed Python dependencies (pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      python:
        patterns:
          - "*"

  # Runtime services: pip-installed from pyproject.toml in Docker images
  - package-ecosystem: "pip"
    directory: "/runtimes/eoapi/stac"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      stac:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/runtimes/eoapi/raster"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      raster:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/runtimes/eoapi/vector"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      vector:
        patterns:
          - "*"

  # CDK CLI (used alongside aws-cdk-lib in the deploy group)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope

  # Docker base images, Dockerfiles, and docker-compose image pins
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
