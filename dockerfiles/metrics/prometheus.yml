global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: stac-auth-proxy
    metrics_path: /stac/_mgmt/metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - stac-auth-proxy:8000

  - job_name: stac
    metrics_path: /_mgmt/metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - stac:8081

  - job_name: raster
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 25s
    static_configs:
      - targets:
          - raster:8082

  - job_name: vector
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - vector:8083

  - job_name: database
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets:
          - postgres-exporter:9187
